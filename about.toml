accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

# Generate the union of licenses required by every native binary shipped in
# the Java jar and Python wheels.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Build and development tools are not linked into the distributed libraries.
ignore-build-dependencies = true
ignore-dev-dependencies = true

# Generation uses cargo-about's --frozen mode so the checked-in report is
# reproducible and does not depend on external license databases.
